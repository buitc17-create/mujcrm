<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- M mark -->
  <text x="256" y="330" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="280" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="auto" letter-spacing="-10">M</text>

  <!-- Cyan underline accent -->
  <rect x="136" y="350" width="240" height="18" rx="9" fill="#00BFFF"/>
</svg>
